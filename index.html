<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="description" content="Anotador profesional para Conga - Lleva el puntaje de tus partidas" />
        <meta name="theme-color" content="#4f46e5" />
        <meta name="color-scheme" content="light dark" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="format-detection" content="telephone=no" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
        <title>Conga Pro — Anotador</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
        <link rel="stylesheet" href="styles.css" />
    </head>
    <body class="bg-gradient-to-br from-slate-100 to-slate-200 dark:from-slate-900 dark:to-slate-800 min-h-screen p-4 font-sans transition-colors duration-200 antialiased">

        <div id="autoSaveIndicator" class="auto-save-indicator">
            <i class="fa-solid fa-cloud-arrow-up"></i>
            <span id="autoSaveText">Guardado automático</span>
        </div>

        <div class="max-w-md mx-auto">
            <div class="backdrop-blur-sm bg-white/90 dark:bg-slate-800/90 rounded-3xl shadow-2xl overflow-hidden p-6 border border-white/20 dark:border-slate-700/50 transition-all duration-300">

                <div class="flex justify-between items-center mb-8">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-600/20">
                            <i class="fa-solid fa-clover text-white text-xl"></i>
                        </div>
                        <h1 class="text-2xl font-black bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent tracking-tight">CONGA PRO</h1>
                    </div>
                    <div class="flex items-center gap-4">
                        <div class="text-right">
                            <span class="text-xs font-semibold uppercase tracking-wider text-slate-400 dark:text-slate-500 flex items-center gap-1">
                                <i class="fa-regular fa-hourglass-half text-indigo-400"></i>
                                Ronda
                            </span>
                            <div class="flex items-center gap-2">
                                <span class="text-3xl font-black text-indigo-600 dark:text-indigo-400 leading-none ronda-editable" id="roundDisplay" onclick="editRound()" title="Haz clic para editar">1</span>
                                <i class="fa-regular fa-pen-to-square text-xs text-slate-400 dark:text-slate-500 cursor-pointer" onclick="editRound()" title="Editar ronda"></i>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="mb-6 bg-slate-50 dark:bg-slate-700/50 p-5 rounded-xl border border-slate-200 dark:border-slate-600 backdrop-blur-sm">
                    <label class="block text-xs font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400 mb-2">
                        <i class="fa-solid fa-shield-halved mr-1"></i>
                        Límite de eliminación
                    </label>
                    <div class="relative">
                        <input
                            type="number"
                            id="limitInput"
                            value="100"
                            min="1"
                            step="1"
                            class="w-full p-3 pl-12 rounded-xl border-2 border-slate-200 dark:border-slate-600 bg-white dark:bg-slate-800 focus:border-indigo-500 dark:focus:border-indigo-400 outline-none font-bold text-lg transition-all"
                            onchange="saveToStorage(); render();"
                        />
                        <i class="fa-solid fa-bolt absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 dark:text-slate-500 text-lg"></i>
                    </div>
                    <p class="text-xs text-slate-400 dark:text-slate-500 mt-2 flex items-center gap-2">
                        <i class="fa-solid fa-circle-exclamation"></i>
                        <span>Los jugadores que alcancen este puntaje quedan eliminados</span>
                    </p>
                </div>

                <div class="flex gap-2 mb-8">
                    <div class="flex-1 relative">
                        <input type="text" id="playerName" placeholder="Nombre del jugador"
                            class="w-full p-3 pl-12 border-2 border-slate-200 dark:border-slate-600 rounded-xl bg-white dark:bg-slate-800 focus:border-indigo-500 dark:focus:border-indigo-400 outline-none transition-all"
                            onkeypress="if (event.key === 'Enter') addPlayer();" maxlength="20" />
                        <i class="fa-regular fa-user absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 dark:text-slate-500 text-lg"></i>
                    </div>
                    <button onclick="addPlayer()" class="bg-gradient-to-r from-indigo-600 to-indigo-700 text-white px-6 py-3 rounded-xl font-bold hover:from-indigo-700 hover:to-indigo-800 active:scale-95 transition-all shadow-lg shadow-indigo-500/30 flex items-center gap-2">
                        <i class="fa-solid fa-plus"></i>
                        <span class="hidden sm:inline">Añadir</span>
                    </button>
                </div>

                <div id="playersList" class="space-y-3 max-h-[400px] overflow-y-auto pr-1 custom-scroll"></div>

                <div class="mt-8 space-y-3">
                    <button id="btnNextRound" onclick="nextRound()" class="hidden w-full bg-gradient-to-r from-slate-800 to-slate-900 dark:from-indigo-600 dark:to-indigo-700 text-white py-4 rounded-xl font-bold hover:from-black hover:to-slate-900 dark:hover:from-indigo-700 dark:hover:to-indigo-800 transition-all shadow-xl text-lg tracking-wide transform hover:scale-[1.02] active:scale-[0.98] flex items-center justify-center gap-3">
                        <i class="fa-solid fa-forward-step"></i>
                        AVANZAR RONDA
                        <i class="fa-solid fa-forward-step"></i>
                    </button>

                    <button onclick="confirmFinishGame()" class="w-full finish-btn text-white py-4 rounded-xl font-bold hover:scale-[1.02] active:scale-[0.98] transition-all shadow-xl text-lg tracking-wide flex items-center justify-center gap-3">
                        <i class="fa-solid fa-flag-checkered"></i>
                        FINALIZAR PARTIDA
                        <i class="fa-solid fa-flag-checkered"></i>
                    </button>

                    <button onclick="resetGame()" class="w-full text-slate-400 dark:text-slate-500 text-xs font-bold uppercase tracking-widest hover:text-red-500 dark:hover:text-red-400 transition py-3 flex items-center justify-center gap-2 group">
                        <i class="fa-solid fa-rotate-right group-hover:rotate-180 transition-transform duration-500"></i>
                        REINICIAR PARTIDA
                    </button>
                </div>
            </div>

            <div class="mt-6 backdrop-blur-sm bg-white/90 dark:bg-slate-800/90 rounded-3xl shadow-xl overflow-hidden p-5 border border-white/20 dark:border-slate-700/50">
                <div class="flex items-center gap-2 mb-4">
                    <i class="fa-solid fa-clock-rotate-left text-indigo-500"></i>
                    <h2 class="font-black text-sm uppercase tracking-wider text-slate-500 dark:text-slate-400">Historial de partidas</h2>
                    <span class="ml-auto text-xs bg-indigo-100 dark:bg-indigo-900/30 text-indigo-600 dark:text-indigo-400 px-2 py-1 rounded-full" id="historyCount">0</span>
                </div>

                <div id="historyList" class="space-y-2 max-h-[300px] overflow-y-auto pr-1 custom-scroll">
                    <div class="text-center py-8 text-slate-400 dark:text-slate-600">
                        <i class="fa-regular fa-receipt text-3xl mb-2 opacity-30"></i>
                        <p class="text-sm">No hay partidas finalizadas</p>
                    </div>
                </div>

                <div class="mt-3 text-right">
                    <button onclick="clearAllHistory()" class="text-xs text-slate-400 dark:text-slate-500 hover:text-red-500 dark:hover:text-red-400 transition-colors px-3 py-1 rounded-full hover:bg-red-50 dark:hover:bg-red-900/20">
                        <i class="fa-regular fa-trash-can mr-1"></i>
                        Limpiar historial
                    </button>
                </div>
            </div>

            <div class="mt-4 text-center text-xs text-slate-400 dark:text-slate-600 flex items-center justify-center gap-6">
                <span class="flex items-center gap-1.5">
                    <span class="w-2 h-2 bg-green-500 rounded-full"></span>
                    Líder
                </span>
                <span class="flex items-center gap-1.5">
                    <span class="w-2 h-2 bg-red-500 rounded-full"></span>
                    Eliminado
                </span>
                <span class="flex items-center gap-1.5">
                    <i class="fa-regular fa-clock"></i>
                    <span id="utcTime">UTC</span>
                </span>
            </div>
        </div>

        <script src="app.js"></script>
    </body>
</html>
